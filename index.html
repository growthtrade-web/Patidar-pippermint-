<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Cinema | Global Movie Database</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; }
        
        header { 
            background: linear-gradient(180deg, #db0000 0%, #000 100%);
            padding: 40px 20px; text-align: center;
        }

        .search-box { 
            text-align: center; padding: 20px; position: sticky; 
            top: 0; background: #000; z-index: 100; 
        }
        #search { 
            padding: 15px; width: 90%; max-width: 500px; 
            border-radius: 30px; border: 2px solid #e50914; 
            background: #111; color: #fff; outline: none; font-size: 16px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px; padding: 15px;
        }

        .card { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .card img { width: 100%; height: 230px; object-fit: cover; background: #222; }
        
        .info { padding: 10px; text-align: center; }
        .info h3 { font-size: 0.9rem; margin-bottom: 10px; height: 35px; overflow: hidden; }

        .links { display: flex; flex-direction: column; gap: 8px; padding: 10px; }
        .btn {
            text-decoration: none; padding: 8px; border-radius: 5px;
            font-size: 12px; font-weight: bold; text-align: center; transition: 0.2s;
        }
        /* New Working Servers */
        .server-1 { background: #e50914; color: #fff; } /* Vegamovies style */
        .server-2 { background: #0056b3; color: #fff; } /* Bollyflix style */
        .server-3 { background: #27ae60; color: #fff; } /* Video Server */

        footer { text-align: center; padding: 30px; color: #555; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <h1>Growth Cinema</h1>
    <p>Search Any Movie in the World</p>
</header>

<div class="search-box">
    <input type="text" id="search" placeholder="Type Movie Name & Press Enter..." onkeypress="handleSearch(event)">
    <p style="font-size: 10px; margin-top: 10px; color: #888;">Note: Search movie to get automatic download links.</p>
</div>

<div class="container" id="movie-grid">
    </div>

<script>
    const key = '3fd2be37162b59b89396193d960052d3';
    const imgPath = 'https://image.tmdb.org/t/p/w500';

    // 1. Movies Load karne ka function
    async function fetchMovies(url) {
        try {
            const res = await fetch(url);
            const data = await res.json();
            displayMovies(data.results);
        } catch (e) {
            console.log("Error");
        }
    }

    // 2. Movies dikhane ka logic
    function displayMovies(movies) {
        const grid = document.getElementById('movie-grid');
        grid.innerHTML = '';
        
        movies.forEach(m => {
            const name = m.title || m.name;
            const poster = m.poster_path ? imgPath + m.poster_path : 'https://via.placeholder.com/500x750?text=No+Photo';
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${poster}" alt="${name}">
                <div class="info"><h3>${name}</h3></div>
                <div class="links">
                    <a href="https://vegamovies.ngo/?s=${name}" target="_blank" class="btn server-1">Server 1 (High Speed)</a>
                    <a href="https://bollyflix.pw/?s=${name}" target="_blank" class="btn server-2">Server 2 (HD)</a>
                    <a href="https://vidsrc.to/embed/movie/${m.id}" target="_blank" class="btn server-3">Watch Online</a>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // 3. Search handle karna
    function handleSearch(event) {
        if (event.key === "Enter") {
            const query = document.getElementById('search').value;
            if (query) {
                fetchMovies(`https://api.themoviedb.org/3/search/multi?api_key=${key}&query=${query}`);
            }
        }
    }

    // Default Trending Movies (Starting mein dikhane ke liye)
    fetchMovies(`https://api.themoviedb.org/3/trending/all/week?api_key=${key}`);

</script>

<footer>
    <p>&copy; 2026 Growth Cinema | Worldwide Database System</p>
</footer>

</body>
</html>
