<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Cinema | New Movies</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #080808; color: white; }
        
        header { 
            background: linear-gradient(180deg, #db0000 0%, #080808 100%);
            padding: 50px 20px; text-align: center;
        }

        .search-box { text-align: center; padding: 20px; position: sticky; top: 0; background: #080808; z-index: 10; }
        #search { padding: 12px; width: 90%; max-width: 400px; border-radius: 20px; border: 1px solid #444; background: #222; color: #fff; }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px; padding: 15px;
        }

        .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .card img { width: 100%; height: 220px; object-fit: cover; background: #333; }
        .card-info { padding: 10px; text-align: center; }
        .card-info h3 { font-size: 0.85rem; height: 35px; overflow: hidden; margin-bottom: 10px; }

        .btn-group { display: flex; flex-direction: column; gap: 5px; padding: 5px; }
        .btn { text-decoration: none; font-size: 11px; padding: 8px; border-radius: 4px; font-weight: bold; text-align: center; }
        .btn-1 { background: #e50914; color: white; }
        .btn-2 { background: #f5c518; color: black; }

        footer { text-align: center; padding: 30px; color: #666; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <h1>Growth Cinema</h1>
    <p>Daily Trending Movies & Series</p>
</header>

<div class="search-box">
    <input type="text" id="search" placeholder="Search Movie Name..." onkeyup="searchMovie()">
</div>

<div class="container" id="movie-grid">
    </div>

<script>
    // TMDB API Details
    const key = '3fd2be37162b59b89396193d960052d3';
    const list_url = `https://api.themoviedb.org/3/trending/all/day?api_key=${key}`;
    const img_url = 'https://image.tmdb.org/t/p/w500';

    async function loadContent() {
        try {
            const response = await fetch(list_url);
            const data = await response.json();
            display(data.results);
        } catch (error) {
            console.log("Error loading movies");
            document.getElementById('movie-grid').innerHTML = "<p style='text-align:center; width:100%;'>Loading failed. Please refresh page.</p>";
        }
    }

    function display(items) {
        const grid = document.getElementById('movie-grid');
        grid.innerHTML = '';
        
        items.forEach(item => {
            const name = item.title || item.name;
            const poster = item.poster_path ? img_url + item.poster_path : 'https://via.placeholder.com/500x750?text=No+Poster';
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${poster}" alt="${name}">
                <div class="card-info">
                    <h3>${name}</h3>
                </div>
                <div class="btn-group">
                    <a href="https://moviebox.site/search/${name}" target="_blank" class="btn btn-1">MovieBox Link</a>
                    <a href="https://ssrmovies.tools/?s=${name}" target="_blank" class="btn btn-2">SSRMovies Link</a>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // Basic Search Logic
    async function searchMovie() {
        const query = document.getElementById('search').value;
        if(query.length > 2) {
            const s_url = `https://api.themoviedb.org/3/search/multi?api_key=${key}&query=${query}`;
            const res = await fetch(s_url);
            const data = await res.json();
            display(data.results);
        } else if (query.length === 0) {
            loadContent();
        }
    }

    loadContent();
</script>

<footer>
    <p>&copy; 2026 Growth Cinema | Entertainment for Everyone</p>
</footer>

</body>
</html>
