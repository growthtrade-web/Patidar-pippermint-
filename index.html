<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Cinema | Watch Online</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Arial', sans-serif; background: #000; color: #fff; }
        
        header { 
            background: linear-gradient(to bottom, #ff0000, #000);
            padding: 40px 20px; text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px; padding: 20px;
        }

        .card { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        
        .info { padding: 10px; text-align: center; }
        .info h3 { font-size: 0.9rem; margin-bottom: 10px; color: #eee; }

        .links { display: flex; flex-direction: column; gap: 8px; padding: 10px; }
        .btn {
            text-decoration: none; padding: 8px; border-radius: 5px;
            font-size: 12px; font-weight: bold; text-align: center;
        }
        .b1 { background: #e50914; color: #fff; }
        .b2 { background: #f39c12; color: #000; }

        footer { text-align: center; padding: 30px; color: #444; }
    </style>
</head>
<body>

<header>
    <h1>Growth Cinema</h1>
    <p>World's Best Movies & Series</p>
</header>

<div class="container" id="movie-list">
    </div>

<script>
    // Ye hai aapka movies ka data. Aap yahan aur movies khud add kar sakte hain.
    const movies = [
        { name: "Pushpa 2: The Rule", img: "https://m.media-amazon.com/images/M/MV5BNGZlNjdlZmMtMDBlYy00MTMzLThkNzAtNzk1YzI3ZGNlZWJjXkEyXkFqcGc@._V1_.jpg" },
        { name: "Singham Again", img: "https://m.media-amazon.com/images/M/MV5BMjA0N2Y0M2ItYmVkOS00N2NmLWE2YjAtM2Q3N2M1N2FhZTE3XkEyXkFqcGc@._V1_.jpg" },
        { name: "Deadpool & Wolverine", img: "https://m.media-amazon.com/images/M/MV5BZTk5OTUyMzUtNmE2Ni00MzEzLWExY2QtMWY2NWVkYjgxM2M2XkEyXkFqcGc@._V1_.jpg" },
        { name: "Jawan", img: "https://m.media-amazon.com/images/M/MV5BOWI5NmU3NWUtOTYzYS00ZmRjLTlhZjktOTRlY2ZlMWFhZDQ0XkEyXkFqcGdeQXVyMTUzNTgzNzM0._V1_.jpg" },
        { name: "Kalki 2898 AD", img: "https://m.media-amazon.com/images/M/MV5BMDk4MTdhYjItZGY2YS00N2VlLWE4NjItZDU2NGI5ZjJlM2I1XkEyXkFqcGdeQXVyMTE0MzY0NjE1._V1_.jpg" },
        { name: "The Dark Knight", img: "https://m.media-amazon.com/images/M/MV5BMTMxNTMwODM0NF5BMl5BanBnXkFtZTcwODAyMTk2Mw@@._V1_.jpg" },
        { name: "Avengers: Endgame", img: "https://m.media-amazon.com/images/M/MV5BMTc5MDE2ODcwNV5BMl5BanBnXkFtZTgwMzI2NzQ2NzM@._V1_.jpg" },
        { name: "Stranger Things", img: "https://m.media-amazon.com/images/M/MV5BM2M0YmIxNzItOWI4My00MmRkLWFmZTMtNjBmZWZlOTUxMmQyXkEyXkFqcGdeQXVyMTUzMTg2ODkz._V1_.jpg" }
    ];

    const list = document.getElementById('movie-list');

    movies.forEach(movie => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="${movie.img}" alt="${movie.name}">
            <div class="info"><h3>${movie.name}</h3></div>
            <div class="links">
                <a href="https://moviebox.site/search/${movie.name}" target="_blank" class="btn b1">MovieBox Link</a>
                <a href="https://ssrmovies.tools/?s=${movie.name}" target="_blank" class="btn b2">SSRMovies Link</a>
            </div>
        `;
        list.appendChild(card);
    });
</script>

<footer>
    <p>&copy; 2026 Growth Cinema | Built by You</p>
</footer>

</body>
</html>
