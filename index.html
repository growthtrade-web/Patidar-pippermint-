<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Cinema | Home</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Arial', sans-serif; background: #000; color: #fff; }
        
        header { 
            background: linear-gradient(to bottom, #ff0000, #000);
            padding: 40px 20px; text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px; padding: 20px;
        }

        .card { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        
        .info { padding: 10px; text-align: center; }
        .info h3 { font-size: 0.9rem; margin-bottom: 10px; }

        .links { display: flex; flex-direction: column; gap: 8px; padding: 10px; }
        .btn {
            text-decoration: none; padding: 8px; border-radius: 5px;
            font-size: 11px; font-weight: bold; text-align: center;
        }
        .b1 { background: #e50914; color: #fff; }
        .b2 { background: #3498db; color: #fff; }

        footer { text-align: center; padding: 30px; color: #444; border-top: 1px solid #222; }
    </style>
</head>
<body>

<header>
    <h1>Growth Cinema</h1>
    <p>Watch Latest Movies & Series</p>
</header>

<div class="container" id="movie-grid">
    </div>

<script>
    // Ye data 100% chalega kyunki ye direct code mein hai
    const movieData = [
        { title: "Pushpa 2: The Rule", img: "https://image.tmdb.org/t/p/w500/vX9Y6R8vG6f1WJ3vMvUvS2X6jYV.jpg" },
        { title: "Singham Again", img: "https://image.tmdb.org/t/p/w500/7V9G6I9UvU6z8UvU6z8UvU6z8Uv.jpg" },
        { title: "Deadpool & Wolverine", img: "https://image.tmdb.org/t/p/w500/8cdWjvZQUvS6UvU6z8UvU6z8UvU.jpg" },
        { title: "Kalki 2898 AD", img: "https://image.tmdb.org/t/p/w500/7V9G6I9UvU6z8UvU6z8UvU6z8Uv.jpg" },
        { title: "Animal", img: "https://image.tmdb.org/t/p/w500/vX9Y6R8vG6f1WJ3vMvUvS2X6jYV.jpg" },
        { title: "Jawan", img: "https://image.tmdb.org/t/p/w500/n8Z89I9UvU6z8UvU6z8UvU6z8Uv.jpg" },
        { title: "Spider-Man: No Way Home", img: "https://image.tmdb.org/t/p/w500/1g0m2YpScyIzXvW9hHozCLJbiST.jpg" },
        { title: "Stranger Things", img: "https://image.tmdb.org/t/p/w500/49WfT1U6NX6YmPOCtz9t99696Yg.jpg" }
    ];

    const grid = document.getElementById('movie-grid');

    // Movies ko display karne ka loop
    movieData.forEach(movie => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="${movie.img}" alt="${movie.title}">
            <div class="info"><h3>${movie.title}</h3></div>
            <div class="links">
                <a href="https://vegamovies.ngo/?s=${movie.title}" target="_blank" class="btn b1">Download Server 1</a>
                <a href="https://bollyflix.pw/?s=${movie.title}" target="_blank" class="btn b2">Download Server 2</a>
            </div>
        `;
        grid.appendChild(card);
    });
</script>

<footer>
    <p>&copy; 2026 Growth Cinema | Fast & Reliable</p>
</footer>

</body>
</html>
