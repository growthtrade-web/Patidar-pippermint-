<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Cinema | Watch & Download Movies</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0e11; color: white; }
        
        header { 
            background: linear-gradient(to bottom, #e50914, #0b0e11);
            padding: 50px 20px; text-align: center;
        }

        .search-container { margin: 20px; text-align: center; }
        #search { padding: 12px; width: 300px; border-radius: 25px; border: none; outline: none; }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto;
        }

        .movie-card {
            background: #1c1f23; border-radius: 10px; overflow: hidden;
            transition: 0.3s; border: 1px solid #333;
        }

        .movie-card:hover { transform: scale(1.05); border-color: #e50914; }

        .movie-card img { width: 100%; height: 300px; object-fit: cover; }

        .movie-info { padding: 15px; text-align: center; }
        .movie-info h3 { font-size: 1rem; margin-bottom: 10px; height: 40px; overflow: hidden; }

        .download-btns { display: flex; flex-direction: column; gap: 8px; padding: 10px; }
        
        .btn {
            text-decoration: none; padding: 8px; border-radius: 5px;
            font-size: 13px; font-weight: bold; text-align: center;
        }

        .moviebox { background: #e50914; color: white; }
        .ssrmovies { background: #ffc107; color: #000; }

        footer { text-align: center; padding: 40px; color: #777; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <h1>Growth Cinema</h1>
    <p>Watch World's Best Movies & Series</p>
</header>

<div class="search-container">
    <input type="text" id="search" placeholder="Search Movie Name...">
</div>

<div class="movies-grid" id="movie-list">
    </div>

<script>
    // TMDB API Key (Ye free hai, maine test ke liye ek demo category set ki hai)
    const API_URL = 'https://api.themoviedb.org/3/discover/movie?sort_by=popularity.desc&api_key=3fd2be37162b59b89396193d960052d3';
    const IMG_PATH = 'https://image.tmdb.org/t/p/w1280';

    const movieList = document.getElementById('movie-list');

    async function getMovies() {
        const res = await fetch(API_URL);
        const data = await res.json();
        showMovies(data.results);
    }

    function showMovies(movies) {
        movieList.innerHTML = '';
        movies.forEach((movie) => {
            const { title, poster_path } = movie;
            const movieEl = document.createElement('div');
            movieEl.classList.add('movie-card');

            movieEl.innerHTML = `
                <img src="${IMG_PATH + poster_path}" alt="${title}">
                <div class="movie-info">
                    <h3>${title}</h3>
                </div>
                <div class="download-btns">
                    <a href="https://moviebox.site/search/${title}" target="_blank" class="btn moviebox">Server 1: MovieBox</a>
                    <a href="https://ssrmovies.tools/?s=${title}" target="_blank" class="btn ssrmovies">Server 2: SSRMovies</a>
                </div>
            `;
            movieList.appendChild(movieEl);
        });
    }

    getMovies();
</script>

<footer>
    <p>&copy; 2026 Growth Cinema | Entertainment Non-Stop</p>
</footer>

</body>
</html>
