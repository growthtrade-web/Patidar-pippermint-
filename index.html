<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Cinema | Watch & Download</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; line-height: 1.6; }
        
        header { 
            background: linear-gradient(180deg, #e50914 0%, #000 100%);
            padding: 60px 20px; text-align: center;
        }

        .search-container {
            position: sticky; top: 0; background: #000; padding: 20px;
            z-index: 1000; text-align: center; border-bottom: 1px solid #222;
        }

        #search {
            width: 90%; max-width: 600px; padding: 15px 25px;
            border-radius: 50px; border: 2px solid #e50914;
            background: #111; color: #fff; font-size: 18px; outline: none;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px; padding: 25px; max-width: 1200px; margin: 0 auto;
        }

        .card { background: #141414; border-radius: 12px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #e50914; }
        .card img { width: 100%; height: 240px; object-fit: cover; }
        
        .info { padding: 12px; text-align: center; }
        .info h3 { font-size: 0.9rem; margin-bottom: 10px; height: 40px; overflow: hidden; }

        .download-box { display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        .btn {
            text-decoration: none; padding: 10px; border-radius: 6px;
            font-size: 12px; font-weight: bold; text-align: center; color: #fff;
        }
        /* Servers jo 100% chalte hain */
        .v-link { background: #ff9900; color: #000; } /* Amazon style server */
        .m-link { background: #e50914; } /* Netflix style server */
        .s-link { background: #3498db; } /* Watch server */

        footer { text-align: center; padding: 50px 20px; color: #666; font-size: 13px; }
    </style>
</head>
<body>

<header>
    <h1>Growth Cinema</h1>
    <p>Duniya ki har movie yahan milegi</p>
</header>

<div class="search-container">
    <input type="text" id="search" placeholder="Movie ka naam likhein (e.g. Pushpa 2)" onkeyup="searchGlobal()">
</div>

<div class="container" id="display">
    </div>

<script>
    // TMDB Key jo movies ka data fetch karegi
    const API_KEY = '3fd2be37162b59b89396193d960052d3';
    
    async function loadInitial() {
        const res = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`);
        const data = await res.json();
        render(data.results);
    }

    async function searchGlobal() {
        const q = document.getElementById('search').value;
        if(q.length > 2) {
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`);
            const data = await res.json();
            render(data.results);
        }
    }

    function render(list) {
        const box = document.getElementById('display');
        box.innerHTML = '';
        list.forEach(m => {
            const name = m.title || m.name;
            if(!m.poster_path) return;

            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <img src="https://image.tmdb.org/p/w500${m.poster_path}">
                <div class="info"><h3>${name}</h3></div>
                <div class="download-box">
                    <a href="https://vidsrc.to/embed/movie/${m.id}" target="_blank" class="btn s-link">Watch Online (HD)</a>
                    <a href="https://www.google.com/search?q=index+of+${name}+download" target="_blank" class="btn v-link">Direct Download</a>
                    <a href="https://vegamovies.ngo/?s=${name}" target="_blank" class="btn m-link">High Speed Link</a>
                </div>
            `;
            box.appendChild(div);
        });
    }

    loadInitial();
</script>

<footer>
    <p>Growth Cinema &copy; 2026 - Unlimited Entertainment</p>
</footer>

</body>
</html>
