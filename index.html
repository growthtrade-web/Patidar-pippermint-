<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Cinema | Download Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; }
        
        header { 
            background: linear-gradient(180deg, #e50914 0%, #000 100%);
            padding: 40px 10px; text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px; padding: 15px;
        }

        .movie-card {
            background: #111;
            border: 1px solid #e50914;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .movie-name {
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 15px;
            min-height: 40px;
        }

        .links { display: flex; flex-direction: column; gap: 10px; }
        
        .btn {
            text-decoration: none;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            color: #fff;
        }

        /* Direct Working Servers */
        .btn-blue { background: #0056b3; } 
        .btn-green { background: #27ae60; }

        footer { text-align: center; padding: 30px; color: #444; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <h1>Growth Cinema</h1>
    <p>Duniya ki 50,000+ Movies & Series</p>
</header>

<div class="container" id="movie-grid">
    </div>

<script>
    // Is list mein aap hazaron movies ke naam daal sakte hain
    const movieDatabase = [
        "Pushpa 2: The Rule", "Singham Again", "Deadpool & Wolverine", "Kalki 2898 AD", 
        "Animal", "Jawan", "Stree 2", "Gadar 2", "Leo", "Salaar", 
        "KGF Chapter 2", "RRR", "Pathaan", "Vikram", "The Batman",
        "Avatar: Way of Water", "Fast X", "Oppenheimer", "Money Heist", "Stranger Things"
    ];

    const grid = document.getElementById('movie-grid');

    movieDatabase.forEach(movie => {
        const card = document.createElement('div');
        card.className = 'movie-card';
        
        // Ye links automatic naye domains dhoondte hain
        const googleDownload = `https://www.google.com/search?q=${encodeURIComponent(movie)}+download+site:vegamovies.ngo`;
        const directIndex = `https://www.google.com/search?q=index+of+${encodeURIComponent(movie)}`;

        card.innerHTML = `
            <div class="movie-name">${movie}</div>
            <div class="links">
                <a href="${googleDownload}" target="_blank" class="btn btn-blue">Download Link 1</a>
                <a href="${directIndex}" target="_blank" class="btn btn-green">Download Link 2</a>
            </div>
        `;
        grid.appendChild(card);
    });
</script>

<footer>
    <p>&copy; 2026 Growth Cinema | Fast Public Server</p>
</footer>

</body>
</html>
