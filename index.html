<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth Cinema Pro</title>

<style>
body { margin:0; font-family:Arial; background:#000; color:#fff; }

header {
    background:linear-gradient(to right, red, black);
    padding:20px;
    text-align:center;
}

.search {
    position:sticky;
    top:0;
    background:#000;
    padding:10px;
}

input {
    width:100%;
    padding:12px;
    font-size:16px;
    background:#111;
    border:1px solid red;
    color:#fff;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:10px;
    padding:10px;
}

.card {
    background:#111;
    border-radius:8px;
    overflow:hidden;
}

.card img {
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3 {
    font-size:14px;
    padding:5px;
    text-align:center;
}

.btn {
    display:block;
    background:red;
    text-align:center;
    padding:8px;
    color:#fff;
    text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>🎬 Growth Cinema</h1>
</header>

<div class="search">
<input type="text" id="search" placeholder="Search..." onkeyup="searchMovie()">
</div>

<div class="grid" id="grid"></div>

<script>

// 🔥 👉 SIRF YAHAN API KEY DAALNI HAI
const API_KEY = "YOUR_API_KEY_HERE";

const IMG = "https://image.tmdb.org/t/p/w500";
const grid = document.getElementById("grid");

// Trending load
async function loadTrending(){
    let res = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`);
    let data = await res.json();
    show(data.results);
}

// Show data
function show(data){
    grid.innerHTML="";
    data.forEach(item=>{
        let title = item.title || item.name;
        let poster = item.poster_path ? IMG + item.poster_path : "";

        let link = "https://www.google.com/search?q=" + encodeURIComponent(title + " watch online");

        let div = document.createElement("div");
        div.className="card";

        div.innerHTML = `
        <img src="${poster}">
        <h3>${title}</h3>
        <a href="${link}" target="_blank" class="btn">Watch</a>
        `;

        grid.appendChild(div);
    });
}

// Search
async function searchMovie(){
    let q = document.getElementById("search").value;

    if(q.length < 2){
        loadTrending();
        return;
    }

    let res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`);
    let data = await res.json();

    show(data.results);
}

// Start
loadTrending();

</script>

</body>
</html>
