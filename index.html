<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth Cinema</title>

<style>
body { font-family: Arial; background:#000; color:#fff; }
header { background:red; padding:20px; text-align:center; }

.search-area {
    position: sticky; top:0; background:#000; padding:10px;
}
input {
    width:100%; padding:10px; font-size:16px;
}

.container {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:10px;
    padding:10px;
}

.card {
    background:#111; padding:10px; border-radius:6px;
    text-align:center;
}

a {
    display:block;
    margin-top:8px;
    padding:8px;
    background:red;
    color:#fff;
    text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>Growth Cinema</h1>
</header>

<div class="search-area">
<input type="text" id="search" placeholder="Search movie..." onkeyup="searchMovie()">
</div>

<div class="container" id="grid"></div>

<script>

const movies = [
"Pushpa 2","Jawan","RRR","KGF Chapter 2",
"Animal","Pathaan","Salaar","Leo",
"Avatar","Oppenheimer","Fast X"
];

const grid = document.getElementById("grid");

function load(data){
    grid.innerHTML="";
    data.forEach(name=>{
        let link = "https://www.youtube.com/results?search_query=" + encodeURIComponent(name + " full movie");

        let div = document.createElement("div");
        div.className="card";

        div.innerHTML = `
        <b>${name}</b>
        <a href="${link}" target="_blank">Watch</a>
        `;

        grid.appendChild(div);
    });
}

function searchMovie(){
    let q = document.getElementById("search").value.toLowerCase();
    let filtered = movies.filter(m=>m.toLowerCase().includes(q));
    load(filtered);
}

load(movies);

</script>

</body>
</html>
