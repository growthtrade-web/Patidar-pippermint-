<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowthTrade - India Market Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #05070a; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .market-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; height: 100%; }
        .header-gradient { background: linear-gradient(90deg, #1e293b 0%, #0f172a 100%); border-bottom: 2px solid #3b82f6; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<header class="p-4 header-gradient flex justify-between items-center sticky top-0 z-50">
    <h1 class="text-xl font-bold text-white tracking-tighter">GROWTH<span class="text-blue-500">TRADE</span> <span class="text-[10px] bg-blue-600 px-2 py-1 rounded ml-2">INDIA HUB</span></h1>
    <div class="flex items-center gap-2">
        <div class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></div>
        <span class="text-xs font-bold text-green-500 uppercase">Live Exchange Feed</span>
    </div>
</header>

<div class="tradingview-widget-container border-b border-gray-800">
    <div class="tradingview-widget-container__widget"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
    {
    "symbols": [
        {"proName": "BITSTAMP:BTCUSD", "title": "BTC/USD"},
        {"s": "OANDA:XAUUSD", "d": "Gold/USD"},
        {"s": "OANDA:XAGUSD", "d": "Silver/USD"},
        {"s": "FX_IDC:INRUSD", "d": "USD/INR"},
        {"s": "CME_MINI:NQ1!", "d": "Nasdaq Futures"}
    ],
    "showSymbolLogo": true, "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "en"
    }
    </script>
</div>

<main class="p-4 grid grid-cols-1 lg:grid-cols-12 gap-4">
    
    <div class="lg:col-span-3 space-y-4">
        <div class="market-card p-4">
            <h2 class="text-xs font-bold text-gray-500 uppercase mb-4 tracking-widest">Global Indices & Cmdty</h2>
            <div class="tradingview-widget-container">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                {
                "colorTheme": "dark", "dateRange": "12M", "showChart": false, "locale": "en", "width": "100%", "height": 600, "isTransparent": true, "showSymbolLogo": true,
                "tabs": [
                    { "title": "World Markets", "symbols": [
                        {"s": "CME_MINI:NQ1!", "d": "Nasdaq 100"},
                        {"s": "CME_MINI:ES1!", "d": "S&P 500"},
                        {"s": "INDEX:DAX", "d": "DAX Index"},
                        {"s": "INDEX:NI225", "d": "Nikkei 225"},
                        {"s": "INDEX:HSI", "d": "Hang Seng"}
                    ]},
                    { "title": "Commodities", "symbols": [
                        {"s": "OANDA:XAUUSD", "d": "Gold"},
                        {"s": "OANDA:XAGUSD", "d": "Silver"},
                        {"s": "NYMEX:CL1!", "d": "Crude Oil"},
                        {"s": "NYMEX:NG1!", "d": "Natural Gas"}
                    ]}
                ]
                }
                </script>
            </div>
        </div>
    </div>

    <div class="lg:col-span-6">
        <div class="market-card p-2" style="height: 650px;">
            <div id="india_main_chart" style="height: 100%;"></div>
        </div>
    </div>

    <div class="lg:col-span-3 space-y-4">
        <div class="market-card p-4">
            <h2 class="text-xs font-bold text-green-500 uppercase mb-4 tracking-widest">India Top Movers (NSE)</h2>
            <div class="tradingview-widget-container">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-hotlists.js" async>
                {
                "colorTheme": "dark", "dateRange": "12M", "exchange": "NSE", "showChart": false, "locale": "en", "width": "100%", "height": 300, "isTransparent": true, "showSymbolLogo": true
                }
                </script>
            </div>
        </div>

        <div class="market-card p-4">
            <h2 class="text-xs font-bold text-gray-500 uppercase mb-4 tracking-widest">Live Market News</h2>
            <div class="tradingview-widget-container">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                {
                "feedMode": "all_symbols", "colorTheme": "dark", "isTransparent": true, "displayMode": "regular", "width": "100%", "height": 300, "locale": "en"
                }
                </script>
            </div>
        </div>
    </div>
</main>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script type="text/javascript">
  new TradingView.widget({
    "autosize": true,
    "symbol": "NSE:RELIANCE",
    "interval": "5",
    "timezone": "Asia/Kolkata",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "enable_publishing": false,
    "allow_symbol_change": true,
    "container_id": "india_main_chart"
  });
</script>

</body>
</html>
