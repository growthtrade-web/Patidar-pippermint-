<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Cinema | Direct Download</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; }
        
        header { 
            background: #e50914; padding: 25px 10px; text-align: center;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.5);
        }

        .search-bar {
            position: sticky; top: 0; background: #000; padding: 15px; text-align: center; border-bottom: 1px solid #333;
        }

        #findMovie {
            width: 90%; max-width: 500px; padding: 12px 20px; border-radius: 30px;
            border: 2px solid #e50914; background: #111; color: #fff; font-size: 16px;
        }

        .container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px; padding: 20px;
        }

        .movie-card {
            background: #141414; border-radius: 8px; border: 1px solid #333;
            padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: space-between;
        }

        .title { font-size: 0.9rem; font-weight: bold; margin-bottom: 15px; color: #ffcc00; min-height: 40px; }

        .btn {
            text-decoration: none; padding: 10px; border-radius: 5px; font-size: 11px;
            font-weight: bold; color: #fff; margin-top: 5px; display: block;
        }

        /* Direct Working Servers */
        .s1 { background: #27ae60; } /* Server 1 */
        .s2 { background: #2980b9; } /* Server 2 */

        footer { text-align: center; padding: 40px; color: #666; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <h1>GROWTH CINEMA</h1>
    <p>Duniya ki har Movie yahan milegi</p>
</header>

<div class="search-bar">
    <input type="text" id="findMovie" placeholder="Movie ka naam likhein..." onkeyup="search()">
</div>

<div class="container" id="grid">
    </div>

<script>
    // Is list mein aap 1000 movies ke naam coma (,) laga kar add kar sakte hain
    const movieData = [
        "Pushpa 2: The Rule", "Singham Again", "Deadpool & Wolverine", "Kalki 2898 AD", 
        "Animal", "Jawan", "Stree 2", "Gadar 2", "Leo", "Salaar", 
        "KGF Chapter 2", "RRR", "Brahmastra", "Pathaan", "Vikram", 
        "Avatar: Way of Water", "Fast X", "Oppenheimer", "The Batman", "Spider-Man No Way Home",
        "Kantata", "Drishyam 2", "Bhool Bhulaiyaa 2", "Major", "Vikram Vedha"
        // Bas yahan naye naam likhte jaiye...
    ];

    const grid = document.getElementById('grid');

    function display(list) {
        grid.innerHTML = '';
        list.forEach(name => {
            const div = document.createElement('div');
            div.className = 'movie-card';
            
            // Ye links Proxy sites ka use karte hain taaki block na hon
            const link1 = `https://unblockit.how/vegamovies?s=${encodeURIComponent(name)}`;
            const link2 = `https://moviesmod.info/?s=${encodeURIComponent(name)}`;

            div.innerHTML = `
                <div class="title">${name}</div>
                <a href="${link1}" target="_blank" class="btn s1">Server 1 (Direct)</a>
                <a href="${link2}" target="_blank" class="btn s2">Server 2 (Mirror)</a>
            `;
            grid.appendChild(div);
        });
    }

    function search() {
        const val = document.getElementById('findMovie').value.toLowerCase();
        const filtered = movieData.filter(m => m.toLowerCase().includes(val));
        display(filtered);
    }

    display(movieData);
</script>

<footer>
    <p>&copy; 2026 Growth Cinema | Built for Public Launch</p>
</footer>

</body>
</html>
