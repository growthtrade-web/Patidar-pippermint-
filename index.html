<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Cinema | Home</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Arial', sans-serif; background: #000; color: #fff; }
        header { background: linear-gradient(to bottom, #ff0000, #000); padding: 40px 20px; text-align: center; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .card img { width: 100%; height: 230px; object-fit: cover; background: #222; }
        .info { padding: 10px; text-align: center; }
        .info h3 { font-size: 0.9rem; margin-bottom: 10px; height: 35px; overflow: hidden; }
        .links { display: flex; flex-direction: column; gap: 8px; padding: 10px; }
        .btn { text-decoration: none; padding: 10px; border-radius: 5px; font-size: 11px; font-weight: bold; text-align: center; color: #fff; }
        .b-watch { background: #e50914; }
        .b-down { background: #3498db; }
        footer { text-align: center; padding: 30px; color: #444; border-top: 1px solid #222; }
    </style>
</head>
<body>

<header>
    <h1>Growth Cinema</h1>
    <p>Watch World's Best Movies & Series</p>
</header>

<div class="container" id="movie-grid">
    </div>

<script>
    // Direct Movies Data (No API needed)
    const movies = [
        { name: "Pushpa 2: The Rule", img: "https://image.tmdb.org/t/p/w500/vX9Y6R8vG6f1WJ3vMvUvS2X6jYV.jpg" },
        { name: "Singham Again", img: "https://image.tmdb.org/t/p/w500/7V9G6I9UvU6z8UvU6z8UvU6z8Uv.jpg" },
        { name: "Deadpool & Wolverine", img: "https://image.tmdb.org/t/p/w500/8cdWjvZQUvS6UvU6z8UvU6z8UvU.jpg" },
        { name: "Kalki 2898 AD", img: "https://image.tmdb.org/t/p/w500/7V9G6I9UvU6z8UvU6z8UvU6z8Uv.jpg" },
        { name: "Animal", img: "https://image.tmdb.org/t/p/w500/vX9Y6R8vG6f1WJ3vMvUvS2X6jYV.jpg" },
        { name: "Jawan", img: "https://image.tmdb.org/t/p/w500/n8Z89I9UvU6z8UvU6z8UvU6z8Uv.jpg" },
        { name: "Spider-Man: No Way Home", img: "https://image.tmdb.org/t/p/w500/1g0m2YpScyIzXvW9hHozCLJbiST.jpg" },
        { name: "Stranger Things", img: "https://image.tmdb.org/t/p/w500/49WfT1U6NX6YmPOCtz9t99696Yg.jpg" },
        { name: "Money Heist", img: "https://image.tmdb.org/t/p/w500/reEMJA1uzpG6Xp9TYvno6AosY3c.jpg" },
        { name: "The Batman", img: "https://image.tmdb.org/t/p/w500/74xTEgt7R36Fpooo50r9T25onun.jpg" }
    ];

    const grid = document.getElementById('movie-grid');

    movies.forEach(movie => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="${movie.img}" alt="${movie.name}">
            <div class="info"><h3>${movie.name}</h3></div>
            <div class="links">
                <a href="https://vidsrc.to/embed/movie/${movie.name}" target="_blank" class="btn b-watch">Watch HD</a>
                <a href="https://www.google.com/search?q=index+of+${movie.name}" target="_blank" class="btn b-down">Google Server</a>
            </div>
        `;
        grid.appendChild(card);
    });
</script>

<footer>
    <p>&copy; 2026 Growth Cinema | Built for Public</p>
</footer>

</body>
</html>
