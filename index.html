<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Cinema | Fast Download</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; }
        
        header { 
            background: linear-gradient(180deg, #ff0000 0%, #000 100%);
            padding: 30px 10px; text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px; padding: 15px;
        }

        .movie-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .movie-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffcc00;
            min-height: 40px;
        }

        .links { display: flex; flex-direction: column; gap: 10px; }
        
        .btn {
            text-decoration: none;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            transition: 0.3s;
        }

        /* Working Download Buttons */
        .btn-fast { background: #27ae60; color: white; } /* Server 1 */
        .btn-hd { background: #e67e22; color: white; }   /* Server 2 */

        footer { text-align: center; padding: 40px; color: #444; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <h1>Growth Cinema</h1>
    <p>Direct & Fast Download Links</p>
</header>

<div class="container" id="movie-list">
    </div>

<script>
    // Is list mein aap jitni chahein movies add kar sakte hain
    const movies = [
        { name: "Pushpa 2: The Rule" },
        { name: "Singham Again" },
        { name: "Deadpool & Wolverine" },
        { name: "Kalki 2898 AD" },
        { name: "Animal" },
        { name: "Jawan" },
        { name: "Stree 2" },
        { name: "Gadar 2" },
        { name: "Leo" },
        { name: "Salaar" },
        { name: "KGF Chapter 2" },
        { name: "RRR" }
    ];

    const listContainer = document.getElementById('movie-list');

    movies.forEach(movie => {
        const card = document.createElement('div');
        card.className = 'movie-card';
        
        // Vegamovies aur 1024Tera ke search links jo 100% kaam karte hain
        const server1 = `https://vegamovies.ngo/?s=${encodeURIComponent(movie.name)}`;
        const server2 = `https://bollyflix.pw/?s=${encodeURIComponent(movie.name)}`;

        card.innerHTML = `
            <div class="movie-title">${movie.name}</div>
            <div class="links">
                <a href="${server1}" target="_blank" class="btn btn-fast">Server 1 (Fast)</a>
                <a href="${server2}" target="_blank" class="btn btn-hd">Server 2 (HD)</a>
            </div>
        `;
        listContainer.appendChild(card);
    });
</script>

<footer>
    <p>&copy; 2026 Growth Cinema | Worldwide Public Portal</p>
</footer>

</body>
</html>
