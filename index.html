<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Growth Trade Terminal v13</title>
<style>
  :root { --neon: #00ff88; --nav-h: 70px; --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; background: #000; color: white; overflow: hidden; font-family: 'Inter', sans-serif; }
  
  .app-shell { display: flex; flex-direction: column; height: 100dvh; }
  
  /* Aapka Gradient Header */
  header { 
    height: 60px; background: var(--gradient); 
    display: flex; align-items: center; justify-content: center; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100;
  }
  header h1 { font-size: 20px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }

  main { flex: 1; position: relative; overflow: hidden; background: #000; }
  
  /* Navigation */
  nav { 
    height: var(--nav-h); background: #111; display: flex; 
    border-top: 1px solid #333; padding-bottom: env(safe-area-inset-bottom, 15px); 
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  nav button { 
    flex: 1; min-width: 75px; background: none; border: none; 
    color: #666; font-size: 10px; font-weight: bold; 
    text-transform: uppercase; cursor: pointer; transition: 0.3s;
  }
  nav button.active { 
    color: var(--neon); border-top: 3px solid var(--neon); 
    background: linear-gradient(to top, rgba(0, 255, 136, 0.1), transparent); 
  }

  /* Heatmap Switcher Overlay */
  .map-tabs { 
    position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
    display: flex; gap: 8px; background: rgba(0,0,0,0.85); 
    padding: 6px; border-radius: 30px; border: 1px solid #444; z-index: 2000; 
  }
  .map-tabs button { 
    background: #222; border: none; color: #aaa; padding: 6px 14px; 
    border-radius: 20px; font-size: 11px; cursor: pointer; font-weight: bold; 
  }
  .map-tabs button.active-sub { background: var(--neon); color: #000; }
</style>
</head>
<body>

<div class="app-shell">
  <header><h1>GrowthTrade Terminal</h1></header>
  
  <main id="view-port">
    <div id="content-area" style="width:100%; height:100%;"></div>
  </main>

  <nav id="bottom-nav">
    <button class="active" onclick="loadWidget('crypto', this)">Crypto</button>
    <button onclick="loadWidget('india_stocks', this)">India Stocks</button>
    <button onclick="loadWidget('market_stats', this)">Global Mkts</button>
    <button onclick="loadWidget('charts', this)">Live Charts</button>
    <button onclick="loadWidget('events', this)">News/Events</button>
    <button onclick="loadWidget('heatmap', this)">Heatmap</button>
  </nav>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const container = document.getElementById('content-area');

function loadWidget(type, btn) {
  document.querySelectorAll('#bottom-nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  container.innerHTML = "";

  if (type === 'crypto') {
    renderScript("https://s3.tradingview.com/external-embedding/embed-widget-screener.js", {"width": "100%", "height": "100%", "screener_type": "crypto_mkt", "colorTheme": "dark", "locale": "en"});
  } 
  else if (type === 'india_stocks') {
    renderScript("https://s3.tradingview.com/external-embedding/embed-widget-screener.js", {"width": "100%", "height": "100%", "screener_type": "stock", "market": "india", "colorTheme": "dark", "locale": "en"});
  }
  else if (type === 'market_stats') {
    // GLOBAL INDICES (EXCLUDING INDIA) + COMMODITIES + LIVE MOVERS
    renderScript("https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js", {
      "colorTheme": "dark", "dateRange": "12M", "showChart": true, "locale": "en", "width": "100%", "height": "100%", "showSymbolLogo": true,
      "tabs": [
        { "title": "World Indices", "symbols": [
            {"s": "FOREXCOM:SPX500", "d": "S&P 500 (US)"}, {"s": "FOREXCOM:NSXUSD", "d": "Nasdaq 100 (US)"}, 
            {"s": "INDEX:DAX", "d": "DAX (Germany)"}, {"s": "INDEX:UKX", "d": "FTSE 100 (UK)"}, 
            {"s": "INDEX:NI225", "d": "Nikkei 225 (Japan)"}, {"s": "INDEX:HSI", "d": "Hang Seng (HK)"},
            {"s": "INDEX:CAC40", "d": "CAC 40 (France)"}
          ]
        },
        { "title": "Commodities", "symbols": [
            {"s": "COMEX:GC1!", "d": "Gold"}, {"s": "COMEX:SI1!", "d": "Silver"}, 
            {"s": "NYMEX:CL1!", "d": "Crude Oil"}, {"s": "NYMEX:NG1!", "d": "Natural Gas"}
          ]
        },
        { "title": "US Top Gainers", "symbols": [], "screener": "america", "filter": "top_gainers" }
      ]
    });
  }
  else if (type === 'charts') {
    const div = document.createElement('div'); div.id = "tv_chart"; div.style.height = "100%"; container.appendChild(div);
    new TradingView.widget({"autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "15", "theme": "dark", "container_id": "tv_chart", "allow_symbol_change": true});
  }
  else if (type === 'events') {
    renderScript("https://s3.tradingview.com/external-embedding/embed-widget-events.js", {"width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en"});
  }
  else if (type === 'heatmap') {
    const navDiv = document.createElement('div'); navDiv.className = "map-tabs";
    navDiv.innerHTML = `<button id="m1" class="active-sub" onclick="runHeatmap('crypto', 'm1')">Crypto</button>
                        <button id="m3" onclick="runHeatmap('us', 'm3')">US Stocks</button>`;
    container.appendChild(navDiv);
    const mapDisplay = document.createElement('div'); mapDisplay.id = "map-render"; mapDisplay.style.height = "100%"; container.appendChild(mapDisplay);
    runHeatmap('crypto', 'm1');
  }
}

function runHeatmap(market, btnId) {
  const display = document.getElementById('map-render');
  display.innerHTML = ""; 
  document.querySelectorAll('.map-tabs button').forEach(b => b.classList.remove('active-sub'));
  document.getElementById(btnId).classList.add('active-sub');

  let scriptUrl, config;
  if (market === 'crypto') {
    scriptUrl = "https://s3.tradingview.com/external-embedding/embed-widget-crypto-coins-heatmap.js";
    config = { "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en" };
  } else {
    scriptUrl = "https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js";
    config = { "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en", "dataSource": "SPX500", "grouping": "sector" };
  }
  const script = document.createElement('script');
  script.src = scriptUrl + "?v=" + new Date().getTime();
  script.async = true; script.innerHTML = JSON.stringify(config);
  display.appendChild(script);
}

function renderScript(src, config) {
  const script = document.createElement('script'); script.src = src; script.async = true;
  script.innerHTML = JSON.stringify(config); container.appendChild(script);
}

window.onload = () => loadWidget('crypto', document.querySelector('#bottom-nav button'));
</script>
</body>
</html>
